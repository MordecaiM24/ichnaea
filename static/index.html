<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ichnaea</title>
    <link href="css/main.min.css" rel="stylesheet" />
    <link href="css/progress.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-md bg-primary mb-5 navbar-dark">
      <div class="container-fluid px-5">
        <a href="#intro" class="navbar-brand me-5">
          <!-- TODO: change logo to text/svg. SVG not working for w/e reason atm -->
          <!-- BIGGER TODO: Change logo. Think of new name lol -->
          <img
            src="assets/ichnaea-logo-zip-file/png/logo-no-background.png"
            alt="Bootstrap"
            width="128"
          />
        </a>
        <!-- toggle button for mobile nav -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#main-nav"
          aria-controls="main-nav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- navbar links -->
        <div class="collapse navbar-collapse" id="main-nav">
          <ul class="navbar-nav w-100 justify-content-around ms-md-5 pt-3">
            <!-- TODO: change justify-around to make myprofile sit at end while keeping distance from logo -->
            <li class="nav-item">
              <a href="#" class="nav-link">
                <p class="lead"><i class="bi bi-bank"></i> Colleges</p>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">
                <p class="lead"><i class="bi bi-coin"></i> Scholarships</p>
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">
                <p class="lead">
                  <i class="bi bi-mortarboard-fill"></i> My Profile
                </p>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- progress bar -->
    <!-- <div
      role="progresscircle"
      aria-valuenow="65"
      aria-valuemin="0"
      aria-valuemax="100"
      style="--value: 65; --size: 12rem"
    ></div> -->

    <div class="container-xxl my-5 px-md-5">
      <div class="list-group">
        <div class="list-group-item list-group-item-action p-0 border-0">
          <div class="row d-flex align-items-center">
            <div class="col-5">
              <a
                class="list-group-item list-group-item-action active w-max-content px-md-5 px-3 rounded-top"
                aria-current="true"
              >
                Common App
              </a>
            </div>
            <div class="row col-7 pe-4 text-center">
              <p class="col-2">Notes</p>
              <p class="col-2">Target Date</p>
              <p class="col-6 pe-4">Status</p>
              <p class="col-2">Priority</p>
            </div>
          </div>
        </div>
        <a
          class="list-group-item list-group-item-action rounded-end rounded-bottom border-top"
        >
          <div class="row d-flex align-items-center">
            <div class="col-5 d-flex align-items-center">
              <i class="bi bi-circle-fill fs-8 text-danger pe-2"></i>
              <p>Reminder</p>
            </div>
            <div class="row col-7 text-center">
              <div class="col-2">
                <i class="bi bi-journal-bookmark-fill fs-5"></i>
              </div>
              <div class="col-2">
                <i class="bi bi-calendar-date fs-5"></i>
              </div>
              <div class="col-6">
                <button class="btn btn-danger w-md">Not Started</button>
              </div>
              <div class="col-2">
                <i class="bi bi-flag fs-5"></i>
              </div>
            </div>
          </div>
        </a>
        <a class="list-group-item list-group-item-action rounded">
          <div class="row d-flex align-items-center">
            <div class="col-5 d-flex align-items-center">
              <i class="bi bi-circle-fill fs-8 text-warning pe-2"></i>
              <p>Reminder</p>
            </div>
            <div class="row col-7 text-center">
              <div class="col-2">
                <i class="bi bi-journal-bookmark-fill fs-5"></i>
              </div>
              <div class="col-2">
                <i class="bi bi-calendar-date fs-5"></i>
              </div>
              <div class="col-6">
                <button class="btn btn-warning w-md">In Progress</button>
              </div>
              <div class="col-2">
                <i class="bi bi-flag fs-5"></i>
              </div>
            </div>
          </div>
        </a>
        <a class="list-group-item list-group-item-action rounded">
          <div class="row d-flex align-items-center">
            <div class="col-5 d-flex align-items-center">
              <i class="bi bi-circle-fill fs-8 text-success pe-2"></i>
              <p>Reminder</p>
            </div>
            <div class="row col-7 text-center">
              <div class="col-2">
                <i class="bi bi-journal-bookmark-fill fs-5"></i>
              </div>
              <div class="col-2">
                <i class="bi bi-calendar-date fs-5"></i>
              </div>
              <div class="col-6">
                <button class="btn btn-success w-md">Complete</button>
              </div>
              <div class="col-2">
                <i class="bi bi-flag fs-5"></i>
              </div>
            </div>
          </div>
        </a>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <!-- tooltip -->
    <script>
      const tooltipTriggerList = document.querySelectorAll(".tt");
      const tooltipList = [...tooltipTriggerList].map(
        (tooltipTriggerEl) => new bootstrap.Tooltip(tooltipTriggerEl)
      );
    </script>
  </body>
</html>
