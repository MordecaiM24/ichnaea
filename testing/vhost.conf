<VirtualHost *:443>
    ServerName universitrack.com
    SSLEngine on
    SSLCertificateFile "/opt/bitnami/apache/conf/universitrack.com.crt"
    SSLCertificateKeyFile "/opt/bitnami/apache/conf/universitrack.com.key"
    # Other directives here
</VirtualHost>

<VirtualHost *:443>
    ServerName server.universitrack.com
    ProxyPass / http://localhost:5000/
    ProxyPassReverse / http://localhost:5000/
    SSLEngine on
    SSLCertificateFile "/opt/bitnami/apache/conf/universitrack.com.crt"
    SSLCertificateKeyFile "/opt/bitnami/apache/conf/universitrack.com.key"
    # Other directives here
</VirtualHost>